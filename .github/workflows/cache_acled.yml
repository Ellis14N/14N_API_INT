name: Cache ACLED Report

on:
  schedule:
    - cron: '5 23 * * *'  # 23:05 UTC = 00:05 Morocco (UTC+1)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run ACLED cache job
        env:
          ACLED_USERNAME: ${{ secrets.ACLED_USERNAME }}
          ACLED_PASSWORD: ${{ secrets.ACLED_PASSWORD }}
        run: python fetch_and_cache.py --task acled

      - name: Push cache file to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE=$(ls cache/acled_conflicts_*.json 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No cache file produced — aborting"
            exit 1
          fi
          echo "Committing: $FILE"

          git fetch origin data:refs/remotes/origin/data 2>/dev/null || true

          if git ls-remote --exit-code origin data >/dev/null 2>&1; then
            git worktree add /tmp/data-branch data
            git -C /tmp/data-branch pull origin data
          else
            git worktree add --orphan -b data /tmp/data-branch
          fi

          mkdir -p /tmp/data-branch/cache
          cp "$FILE" "/tmp/data-branch/$FILE"

          git -C /tmp/data-branch add cache/acled_conflicts_*.json
          git -C /tmp/data-branch diff --cached --quiet && echo "No changes" && exit 0
          git -C /tmp/data-branch commit -m "chore: ACLED cache $(date -u +%Y-%m-%d)"
          git -C /tmp/data-branch push origin data
