name: Cache Travel Advisories

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 02:00 Morocco summer time (UTC+1)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run travel advisories cache job
        run: python fetch_and_cache.py --task travel_advisories

      - name: Commit cache files to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin data:data 2>/dev/null || true
          git checkout data 2>/dev/null || (git checkout --orphan data && git rm -rf . --quiet)

          git checkout main -- cache/ 2>/dev/null || true

          git add "cache/Travel Advisory "*.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update travel advisory cache $(date -u +%d-%m-%y)"
          git push origin data
