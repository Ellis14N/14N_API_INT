name: Cache Travel Advisories

on:
  schedule:
    - cron: '0 1 * * *'   # 01:00 UTC = 02:00 Morocco summer time (UTC+1)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run travel advisories cache job
        run: python fetch_and_cache.py --task travel_advisories

      - name: Push cache file to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE=$(ls "cache/Travel Advisory "*.json 2>/dev/null | head -1)
          if [ -z "$FILE" ]; then
            echo "No cache file produced — aborting"
            exit 1
          fi
          echo "Committing: $FILE"

          # Fetch data branch; initialise it if it doesn't exist yet
          git fetch origin data:refs/remotes/origin/data 2>/dev/null || true

          # Create an isolated worktree on the data branch
          if git ls-remote --exit-code origin data >/dev/null 2>&1; then
            git worktree add /tmp/data-branch data
            git -C /tmp/data-branch pull origin data
          else
            git worktree add --orphan -b data /tmp/data-branch
          fi

          mkdir -p /tmp/data-branch/cache
          cp "$FILE" "/tmp/data-branch/$FILE"

          git -C /tmp/data-branch add "cache/Travel Advisory "*.json
          git -C /tmp/data-branch diff --cached --quiet && echo "No changes" && exit 0
          git -C /tmp/data-branch commit -m "chore: travel advisory cache $(date -u +%d-%m-%y)"
          git -C /tmp/data-branch push origin data
