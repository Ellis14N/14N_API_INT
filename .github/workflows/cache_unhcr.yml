name: Cache UNHCR Displacement Data

on:
  schedule:
    - cron: '0 1 * * 1'   # 01:00 UTC every Monday = 02:00 Morocco (UTC+1)
  workflow_dispatch:        # allow manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  cache:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run UNHCR cache job
        run: python fetch_and_cache.py --task unhcr

      - name: Push cache file to data branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          FILE="cache/UNHCR Latest.json"

          if [ ! -f "$FILE" ]; then
            echo "Cache file not found: $FILE"
            ls cache/ || true
            exit 1
          fi
          echo "Committing: $FILE"

          git fetch origin data:refs/remotes/origin/data 2>/dev/null || true

          if git ls-remote --exit-code origin data >/dev/null 2>&1; then
            git worktree add /tmp/data-branch data
            git -C /tmp/data-branch pull origin data --rebase 2>/dev/null || true
          else
            git worktree add --orphan -b data /tmp/data-branch
          fi

          mkdir -p "/tmp/data-branch/cache"
          cp "$FILE" "/tmp/data-branch/${FILE}"

          cd /tmp/data-branch
          git add "cache/UNHCR Latest.json"
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: unhcr displacement cache $(date -u +%d-%m-%y)"
          git push origin data
